name: Docs Pipeline

on:
  push:

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            **/package-lock.json

      - name: Ensure docs folders
        shell: bash
        run: |
          mkdir -p docs/components
          mkdir -p docs/tokens
          mkdir -p docs/design-system
          mkdir -p docs/architecture

      - name: Generate docs
        shell: bash
        run: |
          node agents/docs-agent/runner.js --mode generate

      - name: Publish docs to Dracosaurus (retry)
        shell: bash
        env:
          DRACOSAURUS_TOKEN: ${{ secrets.DRACOSAURUS_TOKEN }}
          DRACOSAURUS_BASE_URL: ${{ secrets.DRACOSAURUS_BASE_URL }}
        run: |
          set +e
          mkdir -p .ai
          : > .ai/docs-agent-ci.log
          attempts=3
          delay=5
          success=0
          for attempt in $(seq 1 $attempts); do
            echo "Publish attempt $attempt/$attempts" | tee -a .ai/docs-agent-ci.log
            node agents/docs-agent/runner.js --mode publish 2>&1 | tee -a .ai/docs-agent-ci.log
            code=$?
            if [ $code -eq 0 ]; then
              success=1
              break
            fi
            echo "Publish failed with code $code" | tee -a .ai/docs-agent-ci.log
            if [ $attempt -lt $attempts ]; then
              echo "Retrying in ${delay}s" | tee -a .ai/docs-agent-ci.log
              sleep $delay
              delay=$((delay * 2))
            fi
          done
          if [ $success -ne 1 ]; then
            echo "Publish failed after retries" | tee -a .ai/docs-agent-ci.log
            exit 1
          fi

      - name: Upload docs artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-agent-output
          path: |
            docs
            .ai/docs-agent-cache.json
            .ai/docs-agent-ci.log
          if-no-files-found: warn


