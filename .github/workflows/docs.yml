name: Docs Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            website/package.json

      - name: Ensure docs folders
        shell: bash
        run: |
          mkdir -p docs/components
          mkdir -p docs/tokens
          mkdir -p docs/design-system
          mkdir -p docs/architecture

      - name: Generate docs
        shell: bash
        run: |
          node agents/docs-agent/runner.js --mode generate

      - name: Install website dependencies
        shell: bash
        run: |
          npm --prefix website install --no-audit --no-fund

      - name: Build Docusaurus site
        shell: bash
        run: |
          mkdir -p .ai
          node agents/docs-agent/runner.js --mode publish 2>&1 | tee .ai/docs-agent-ci.log

      - name: Configure GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      - name: Upload docs artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-agent-output
          path: |
            docs
            website/build
            .ai/docs-agent-cache.json
            .ai/docs-agent-ci.log
          if-no-files-found: warn

  docs-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docs-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


